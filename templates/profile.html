<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XenoBiz - Business Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1e;
      --panel: #111827;
      --panel-2: #0d1424;
      --line: #1e2d3d;
      --accent: #2563eb;
      --success: #10b981;
      --text: #e2e8f0;
      --muted: #64748b;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(10, 15, 30, 0.92);
      border-bottom: 1px solid rgba(226, 232, 240, 0.08);
      backdrop-filter: blur(14px);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-size: 18px;
      font-weight: 800;
    }

    .logo::before {
      content: "";
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid rgba(226, 232, 240, 0.14);
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.14s ease;
      text-decoration: none;
    }

    .btn:hover {
      border-color: rgba(37, 99, 235, 0.55);
      background: rgba(37, 99, 235, 0.12);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .container {
      width: min(800px, calc(100% - 40px));
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-title h1 {
      margin: 0 0 8px;
      color: var(--white);
      font-size: 42px;
      font-weight: 800;
    }

    .page-title p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .profile-banner {
      background: rgba(37, 99, 235, 0.12);
      border: 1px solid rgba(37, 99, 235, 0.28);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 32px;
      display: none;
    }

    .profile-banner.show {
      display: block;
    }

    .profile-banner p {
      margin: 0;
      color: var(--text);
      font-weight: 600;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-label {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .form-input,
    .form-select,
    .form-textarea {
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.18s ease;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: var(--white);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.14s ease;
    }

    .save-btn:hover {
      background: #1d4ed8;
    }

    .save-btn:active {
      transform: translateY(1px);
    }

    .save-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      display: none;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.28);
      color: var(--success);
    }

    .message.error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.28);
      color: #ef4444;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .navbar {
        padding: 0 20px;
      }

      .container {
        padding: 20px 20px;
      }

      .page-title h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="logo" href="/">XenoBiz</a>
    <div class="nav-actions">
      <a class="btn" href="/index">Back to Console</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-title">
      <h1>Business Profile</h1>
      <p>Help your AI manager understand your business</p>
    </div>

    <div id="profileBanner" class="profile-banner">
      <p>Your AI manager doesn't know your business yet. Fill this in to unlock personalized advice.</p>
    </div>

    <form id="profileForm">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="businessName">Business Name</label>
          <input type="text" id="businessName" name="business_name" class="form-input" placeholder="Your Business Name" />
        </div>

        <div class="form-group">
          <label class="form-label" for="businessType">Business Type</label>
          <select id="businessType" name="business_type" class="form-select">
            <option value="">Select type...</option>
            <option value="Retail">Retail</option>
            <option value="E-commerce">E-commerce</option>
            <option value="Service">Service</option>
            <option value="Tech/SaaS">Tech/SaaS</option>
            <option value="Food & Beverage">Food & Beverage</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="industry">Industry</label>
          <input type="text" id="industry" name="industry" class="form-input" placeholder="e.g. Technology, Healthcare, Retail" />
        </div>

        <div class="form-group">
          <label class="form-label" for="location">Location</label>
          <input type="text" id="location" name="location" class="form-input" placeholder="e.g. Lagos Nigeria" />
        </div>

        <div class="form-group">
          <label class="form-label" for="teamSize">Team Size</label>
          <select id="teamSize" name="team_size" class="form-select">
            <option value="">Select size...</option>
            <option value="Just me">Just me</option>
            <option value="2-5">2-5</option>
            <option value="6-15">6-15</option>
            <option value="16-50">16-50</option>
            <option value="50+">50+</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="monthlyRevenue">Monthly Revenue Range</label>
          <select id="monthlyRevenue" name="monthly_revenue" class="form-select">
            <option value="">Select range...</option>
            <option value="Under ₦100k">Under ₦100k</option>
            <option value="₦100k-500k">₦100k-500k</option>
            <option value="₦500k-1M">₦500k-1M</option>
            <option value="₦1M-5M">₦1M-5M</option>
            <option value="₦5M-20M">₦5M-20M</option>
            <option value="₦20M+">₦20M+</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="mainProduct">Main Product/Service</label>
          <input type="text" id="mainProduct" name="main_product" class="form-input" placeholder="What do you sell or offer?" />
        </div>

        <div class="form-group">
          <label class="form-label" for="targetMarket">Target Market</label>
          <input type="text" id="targetMarket" name="target_market" class="form-input" placeholder="Who are your customers?" />
        </div>

        <div class="form-group full-width">
          <label class="form-label" for="biggestChallenge">Biggest Challenge Right Now</label>
          <textarea id="biggestChallenge" name="biggest_challenge" class="form-textarea" placeholder="What's your biggest challenge or pain point?"></textarea>
        </div>

        <div class="form-group full-width">
          <label class="form-label" for="businessGoals">Business Goals This Year</label>
          <textarea id="businessGoals" name="business_goals" class="form-textarea" placeholder="What are your main goals for this year?"></textarea>
        </div>
      </div>

      <button type="submit" class="save-btn" id="saveBtn">Save Business Profile</button>

      <div id="message" class="message"></div>
    </form>
  </main>

  <script>
    const profileForm = document.getElementById('profileForm');
    const saveBtn = document.getElementById('saveBtn');
    const messageEl = document.getElementById('message');
    const profileBanner = document.getElementById('profileBanner');

    // Load existing profile
    async function loadProfile() {
      try {
        const response = await fetch('/profile/business');
        if (response.ok) {
          const profile = await response.json();
          if (Object.keys(profile).length === 0) {
            profileBanner.classList.add('show');
          } else {
            profileBanner.classList.remove('show');
          }

          // Fill form fields
          Object.keys(profile).forEach(key => {
            const element = document.getElementById(key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g, ''));
            if (element) {
              element.value = profile[key] || '';
            }
          });
        }
      } catch (error) {
        console.error('Failed to load profile:', error);
      }
    }

    // Save profile
    async function saveProfile(data) {
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const response = await fetch('/profile/business', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data),
        });

        const result = await response.json();

        if (response.ok) {
          messageEl.textContent = result.message || 'Profile saved successfully.';
          messageEl.className = 'message success';
          messageEl.style.display = 'block';
          profileBanner.classList.remove('show');
          setTimeout(() => {
            messageEl.style.display = 'none';
          }, 5000);
        } else {
          messageEl.textContent = result.error || 'Failed to save profile.';
          messageEl.className = 'message error';
          messageEl.style.display = 'block';
        }
      } catch (error) {
        messageEl.textContent = 'Network error. Please try again.';
        messageEl.className = 'message error';
        messageEl.style.display = 'block';
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Business Profile';
      }
    }

    // Form submission
    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(profileForm);
      const data = {};
      for (let [key, value] of formData.entries()) {
        data[key] = value;
      }

      await saveProfile(data);
    });

    // Load profile on page load
    loadProfile();
  </script>
</body>
</html>
